  <rect x="2020" y="800" width="480" height="110" class="gray" filter="url(#shadow)"/>
  <text x="2048" y="838" class="boxTitle">collage.js</text>
  <text x="2048" y="866" class="desc">用 `labelImages[...]` 生成拼贴标签外观</text>
  <text x="2048" y="889" class="small">buildDynamicLabels() / drawLabelObject()</text>

  <rect x="2020" y="950" width="480" height="110" class="gray" filter="url(#shadow)"/>
  <text x="2048" y="988" class="boxTitle">ui.js</text>
  <text x="2048" y="1016" class="desc">用 `uiIcons.camera` / `uiIcons.refresh` 画按钮</text>
  <text x="2048" y="1039" class="small">drawIconButton()</text>

