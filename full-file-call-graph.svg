<svg width="2600" height="1680" viewBox="0 0 2600 1680" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="2600" y2="1680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFE"/>
      <stop offset="1" stop-color="#EDF2FA"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#6E7AA4" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5D6782"/>
    </marker>
    <style>
      .title { font: 700 42px "Arial", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #27314A; }
      .sub { font: 400 18px "Arial", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #62708C; }
      .section { font: 700 22px "Arial", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #2E3852; }
      .boxTitle { font: 700 22px "Arial", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #29344D; }
      .file { font: 600 16px "Courier New", monospace; fill: #6C7693; }
      .desc { font: 400 15px "Arial", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #46536F; }
      .small { font: 600 13px "Arial", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #56627D; }
      .tag { font: 700 13px "Arial", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #44516D; }
      .group { fill: rgba(255,255,255,0.42); stroke: #D7DEEE; stroke-width: 1.2; stroke-dasharray: 8 6; rx: 28; }
      .blue { fill: #F8FBFF; stroke: #B9C9E6; stroke-width: 1.6; rx: 22; }
      .green { fill: #F6FCFA; stroke: #B8DDCF; stroke-width: 1.6; rx: 22; }
      .purple { fill: #FBF8FF; stroke: #D7CAF0; stroke-width: 1.6; rx: 22; }
      .peach { fill: #FFF8F4; stroke: #EACBB4; stroke-width: 1.6; rx: 22; }
      .gray { fill: #F7F8FC; stroke: #D5DBEA; stroke-width: 1.6; rx: 22; }
      .line { stroke: #5D6782; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .lineDash { stroke: #8B97B4; stroke-width: 2; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrow); }
      .lineData { stroke: #5A8E7B; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .lineFx { stroke: #866FB8; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="2600" height="1680" fill="url(#bg)"/>
  <text x="70" y="84" class="title">全文件调用关系图</text>
  <text x="70" y="118" class="sub">从 index.html 开始，展开当前文件夹内主要文件的加载顺序、直接调用关系与资源依赖</text>

