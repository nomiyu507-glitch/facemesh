  <text x="1430" y="192" class="section">D. 直接调用关系</text>
  <rect x="1470" y="260" width="420" height="120" class="blue" filter="url(#shadow)"/>
  <text x="1498" y="298" class="boxTitle">sketch.js → 生命周期入口</text>
  <text x="1498" y="328" class="desc">setup(): initVideo / initIntroLayers / initThreeParticles / resetExperience</text>
  <text x="1498" y="351" class="desc">draw(): 按 state 调用各场景函数</text>

  <rect x="1470" y="420" width="420" height="100" class="gray" filter="url(#shadow)"/>
  <text x="1498" y="456" class="boxTitle">tracking.js</text>
  <text x="1498" y="484" class="desc">初始化摄像头与 ml5，提供手势/人脸数据</text>

