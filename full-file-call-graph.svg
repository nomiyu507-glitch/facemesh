  <text x="118" y="290" class="boxTitle">页面入口 / 装配器</text>
  <text x="118" y="320" class="file">index.html</text>
  <text x="118" y="354" class="desc">挂载 DOM 容器</text>
  <text x="118" y="380" class="desc">按顺序加载外部库与项目脚本</text>
  <text x="118" y="404" class="small">#app / #p5-container / #three-container</text>

  <rect x="90" y="470" width="340" height="120" class="gray" filter="url(#shadow)"/>
