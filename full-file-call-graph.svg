  <rect x="2020" y="1130" width="480" height="250" class="blue" filter="url(#shadow)"/>
  <text x="2048" y="1168" class="boxTitle">文件到文件的主线总结</text>
  <text x="2048" y="1200" class="desc">index.html</text>
  <text x="2140" y="1200" class="desc">→ 依次加载 style / 外部库 / particles / config / state / tracking / patches / ui / intro / questions / collage / stages / sketch</text>
  <text x="2048" y="1240" class="desc">sketch.js</text>
  <text x="2140" y="1240" class="desc">→ 作为总入口，直接调 tracking / intro / questions / collage / stages / particles</text>
  <text x="2048" y="1280" class="desc">state.js + config.js</text>
  <text x="2215" y="1280" class="desc">→ 作为所有场景共享的数据层和规则层</text>
  <text x="2048" y="1320" class="desc">img/*</text>
  <text x="2140" y="1320" class="desc">→ 由 sketch preload 读入，再被 collage.js 和 ui.js 使用</text>
  <text x="2048" y="1360" class="desc">particles.js</text>
  <text x="2140" y="1360" class="desc">→ 基于 three.js，为 stages.js / sketch.js 提供粒子与辉光效果</text>
</svg>
