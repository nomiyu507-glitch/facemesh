  <text x="2048" y="348" class="desc">camera.png / refresh.png</text>
  <text x="2048" y="374" class="desc">paper_label_warning.png / paper_label_tag.png / paper_label_round.png / paper_label_rect.png / paper_label_tape.png</text>
  <text x="2048" y="400" class="desc">Blue Label Clean 1.png / Purple Sticky Tab Small 1.png</text>
  <text x="2048" y="426" class="desc">White Label Folded 1.png / Rounded White 1.png / Orange Round Subtle Tear 1.png</text>

  <rect x="2020" y="500" width="480" height="110" class="gray" filter="url(#shadow)"/>
  <text x="2048" y="538" class="boxTitle">sketch.js preload</text>
  <text x="2048" y="566" class="desc">把上面的图片加载进 `uiIcons` 和 `labelImages`</text>
  <text x="2048" y="589" class="small">后续供 collage.js / ui.js 使用</text>

  <rect x="2020" y="650" width="480" height="110" class="gray" filter="url(#shadow)"/>
