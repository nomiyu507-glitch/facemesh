<svg width="2200" height="1280" viewBox="0 0 2200 1280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="2200" y2="1280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFE"/>
      <stop offset="1" stop-color="#EEF2FA"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#6E7AA4" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5C6783"/>
    </marker>
    <style>
      .title { font: 700 42px "Arial", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #27314A; }
      .sub { font: 400 18px "Arial", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #62708D; }
      .section { font: 700 24px "Arial", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #2F3953; }
      .boxTitle { font: 700 24px "Arial", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #29344D; }
      .file { font: 600 16px "Courier New", monospace; fill: #6C7693; }
      .desc { font: 400 16px "Arial", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #46536F; }
      .small { font: 600 13px "Arial", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #56627D; }
      .tag { font: 700 13px "Arial", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #44516D; }
      .group { fill: rgba(255,255,255,0.42); stroke: #D7DEEE; stroke-width: 1.2; stroke-dasharray: 8 6; rx: 28; }
      .blue { fill: #F8FBFF; stroke: #B9C9E6; stroke-width: 1.6; rx: 24; }
      .green { fill: #F6FCFA; stroke: #B8DDCF; stroke-width: 1.6; rx: 24; }
      .purple { fill: #FBF8FF; stroke: #D7CAF0; stroke-width: 1.6; rx: 24; }
      .peach { fill: #FFF8F4; stroke: #EACBB4; stroke-width: 1.6; rx: 24; }
      .gray { fill: #F7F8FC; stroke: #D5DBEA; stroke-width: 1.6; rx: 24; }
      .line { stroke: #5C6783; stroke-width: 2.6; fill: none; marker-end: url(#arrow); }
      .lineDash { stroke: #8B97B4; stroke-width: 2.1; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrow); }
      .lineData { stroke: #5A8E7B; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
      .lineFx { stroke: #866FB8; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="2200" height="1280" fill="url(#bg)"/>
  <text x="70" y="84" class="title">分组后的文件调用关系图</text>
  <text x="70" y="118" class="sub">把相似功能文件合并成模块，只保留最关键的调用主线</text>

  <rect x="50" y="150" width="2100" height="1080" class="group"/>

  <text x="80" y="196" class="section">1. 页面入口</text>
  <rect x="100" y="250" width="360" height="180" class="blue" filter="url(#shadow)"/>
  <text x="130" y="292" class="boxTitle">页面装配层</text>
  <text x="130" y="324" class="file">index.html + style.css + favicon.ico</text>
  <text x="130" y="360" class="desc">创建 DOM 容器与页面层级</text>
  <text x="130" y="388" class="desc">按顺序加载外部库和项目脚本</text>

  <text x="560" y="196" class="section">2. 外部运行时</text>
  <rect x="600" y="250" width="360" height="180" class="green" filter="url(#shadow)"/>
  <text x="630" y="292" class="boxTitle">运行时库</text>
  <text x="630" y="324" class="file">p5.js + ml5.js + three.js</text>
  <text x="630" y="360" class="desc">画布生命周期 / AI 识别 / WebGL 特效</text>
  <text x="630" y="388" class="desc">为项目脚本提供底层能力</text>

  <text x="1060" y="196" class="section">3. 核心控制</text>
  <rect x="1100" y="250" width="400" height="180" class="peach" filter="url(#shadow)"/>
  <text x="1130" y="292" class="boxTitle">主调度层</text>
  <text x="1130" y="324" class="file">sketch.js</text>
  <text x="1130" y="360" class="desc">preload / setup / draw</text>
  <text x="1130" y="388" class="desc">统一分发所有场景与交互流程</text>

  <text x="1600" y="196" class="section">4. 共享基础模块</text>
  <rect x="1640" y="230" width="450" height="120" class="gray" filter="url(#shadow)"/>
  <text x="1670" y="270" class="boxTitle">配置与状态</text>
  <text x="1670" y="300" class="file">js/config.js + js/state.js</text>
  <text x="1670" y="326" class="desc">题目、词库、布局常量、全局状态</text>

  <rect x="1640" y="380" width="450" height="120" class="gray" filter="url(#shadow)"/>
  <text x="1670" y="420" class="boxTitle">输入与事件</text>
  <text x="1670" y="450" class="file">js/tracking.js + js/ui.js</text>
  <text x="1670" y="476" class="desc">摄像头/手势/人脸追踪 + 点击转发/保存</text>

  <rect x="1640" y="530" width="450" height="120" class="gray" filter="url(#shadow)"/>
  <text x="1670" y="570" class="boxTitle">视觉资源与特效</text>
  <text x="1670" y="600" class="file">img/* + particles.js</text>
  <text x="1670" y="626" class="desc">标签图片、按钮图标、粒子与辉光效果</text>

  <path d="M 460 340 C 520 340, 540 340, 600 340" class="line"/>
  <path d="M 960 340 C 1020 340, 1040 340, 1100 340" class="line"/>
  <path d="M 1500 340 C 1560 340, 1580 290, 1640 290" class="line"/>
  <path d="M 1500 340 C 1560 340, 1580 440, 1640 440" class="line"/>
  <path d="M 1500 340 C 1560 340, 1580 590, 1640 590" class="line"/>
  <text x="500" y="320" class="tag">加载外部库</text>
  <text x="1000" y="320" class="tag">进入主调度</text>
  <text x="1540" y="278" class="tag">读取规则与状态</text>
  <text x="1540" y="430" class="tag">读取输入与交互</text>
  <text x="1540" y="580" class="tag">读取资源与特效</text>

  <text x="80" y="520" class="section">5. 场景模块</text>
  <rect x="100" y="590" width="420" height="160" class="purple" filter="url(#shadow)"/>
  <text x="130" y="632" class="boxTitle">Intro 模块</text>
  <text x="130" y="664" class="file">js/intro.js</text>
  <text x="130" y="700" class="desc">首页图层、网格人脸、滑动进入</text>
  <text x="130" y="728" class="desc">状态：intro</text>

  <rect x="560" y="590" width="420" height="160" class="purple" filter="url(#shadow)"/>
  <text x="590" y="632" class="boxTitle">Question 模块</text>
  <text x="590" y="664" class="file">js/questions.js</text>
  <text x="590" y="700" class="desc">Q1-Q4 选择、写入 userAnswers</text>
  <text x="590" y="728" class="desc">状态：gestureQuestion</text>

  <rect x="1020" y="590" width="500" height="160" class="purple" filter="url(#shadow)"/>
  <text x="1050" y="632" class="boxTitle">Collage 模块</text>
  <text x="1050" y="664" class="file">js/collage.js</text>
  <text x="1050" y="700" class="desc">拼贴标签、Q1-Q4 视觉映射、撕标签、碎片截图</text>
  <text x="1050" y="728" class="desc">状态：collageStudio / resultFragments</text>

  <rect x="1560" y="590" width="530" height="160" class="purple" filter="url(#shadow)"/>
  <text x="1590" y="632" class="boxTitle">Patch / Portrait 模块</text>
  <text x="1590" y="664" class="file">js/patches.js + js/stages.js</text>
  <text x="1590" y="700" class="desc">生成标签补丁、撕掉标签、倒计时拍摄、最终肖像</text>
  <text x="1590" y="728" class="desc">状态：generatingLabels / patchMask / finalPortrait</text>

  <path d="M 1300 430 C 1300 500, 300 500, 300 590" class="line"/>
  <path d="M 1300 430 C 1300 520, 720 520, 720 590" class="line"/>
  <path d="M 1300 430 C 1300 540, 1270 540, 1270 590" class="line"/>
  <path d="M 1300 430 C 1300 520, 1820 520, 1820 590" class="line"/>
  <text x="1180" y="490" class="tag">按 state 分发页面</text>

  <path d="M 520 670 C 535 670, 545 670, 560 670" class="line"/>
  <path d="M 980 670 C 995 670, 1005 670, 1020 670" class="line"/>
  <path d="M 1520 670 C 1535 670, 1545 670, 1560 670" class="line"/>
  <text x="532" y="650" class="tag">进入问答</text>
  <text x="992" y="650" class="tag">答题后进入拼贴</text>
  <text x="1530" y="650" class="tag">进入生成 / 补丁 / 肖像</text>

  <text x="80" y="820" class="section">6. 主流程总结</text>
  <rect x="100" y="890" width="1990" height="220" class="blue" filter="url(#shadow)"/>
  <text x="130" y="934" class="boxTitle">调用主线</text>
  <text x="130" y="972" class="desc">index.html</text>
  <text x="250" y="972" class="desc">→ 加载 `style.css`、外部库、项目脚本</text>
  <text x="130" y="1010" class="desc">sketch.js</text>
  <text x="250" y="1010" class="desc">→ 作为总入口，调用 Intro / Question / Collage / Patch-Portrait 四大模块</text>
  <text x="130" y="1048" class="desc">config.js + state.js</text>
  <text x="370" y="1048" class="desc">→ 所有模块共用的规则层和状态层</text>
  <text x="130" y="1086" class="desc">tracking.js + ui.js</text>
  <text x="370" y="1086" class="desc">→ 所有模块共用的输入层和事件层</text>

  <path d="M 1865 500 C 1865 540, 1865 550, 1865 590" class="lineFx"/>
  <path d="M 1865 350 C 1865 360, 1865 370, 1865 380" class="lineData"/>
  <path d="M 1865 500 C 1865 515, 1865 520, 1865 530" class="lineData"/>
  <text x="1880" y="565" class="tag">资源进入场景层</text>
</svg>
