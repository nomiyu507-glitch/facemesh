<svg width="1800" height="980" viewBox="0 0 1800 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1800" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFE"/>
      <stop offset="1" stop-color="#EEF2FA"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#6D7AA5" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5C6783"/>
    </marker>
    <style>
      .title { font: 700 40px "Arial", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #27314A; }
      .sub { font: 400 18px "Arial", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #61708D; }
      .boxTitle { font: 700 24px "Arial", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #27314A; }
      .file { font: 600 16px "Courier New", monospace; fill: #6C7593; }
      .desc { font: 400 16px "Arial", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #47546F; }
      .small { font: 600 14px "Arial", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #56627E; }
      .section { font: 700 22px "Arial", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #2F3953; }
      .boxA { fill: #FFFFFF; stroke: #CBD5EA; stroke-width: 1.6; rx: 24; }
      .boxB { fill: #F8FBFF; stroke: #B9CAE7; stroke-width: 1.6; rx: 24; }
      .boxC { fill: #FBF8FF; stroke: #D8CAF0; stroke-width: 1.6; rx: 24; }
      .boxD { fill: #F6FCFA; stroke: #B8DDCF; stroke-width: 1.6; rx: 24; }
      .boxE { fill: #FFF8F4; stroke: #EACBB4; stroke-width: 1.6; rx: 24; }
      .group { fill: rgba(255,255,255,0.4); stroke: #D8DFEF; stroke-width: 1.2; stroke-dasharray: 8 6; rx: 28; }
      .line { stroke: #5C6783; stroke-width: 2.6; fill: none; marker-end: url(#arrow); }
      .lineDash { stroke: #8D98B5; stroke-width: 2.2; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrow); }
      .tag { font: 700 13px "Arial", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #41506D; }
    </style>
  </defs>

  <rect width="1800" height="980" fill="url(#bg)"/>

  <text x="70" y="84" class="title">页面直接调用逻辑图</text>
  <text x="70" y="118" class="sub">只看页面 / 场景跳转，不展开底层算法；每个框下方保留简短说明短语</text>

  <rect x="50" y="155" width="1700" height="700" class="group"/>
  <text x="75" y="193" class="section">主流程</text>

  <rect x="90" y="255" width="250" height="150" rx="24" class="boxB" filter="url(#shadow)"/>
  <text x="115" y="290" class="boxTitle">1. Intro</text>
  <text x="115" y="318" class="file">state = "intro"</text>
  <text x="115" y="349" class="desc">首页 / 雾化人脸 / 网格</text>
  <text x="115" y="376" class="desc">手势滑动进入体验</text>
  <text x="115" y="398" class="small">drawIntro()</text>

  <rect x="420" y="255" width="270" height="150" rx="24" class="boxC" filter="url(#shadow)"/>
  <text x="445" y="290" class="boxTitle">2. Question</text>
  <text x="445" y="318" class="file">state = "gestureQuestion"</text>
  <text x="445" y="349" class="desc">问题页 / 手势悬停选择</text>
  <text x="445" y="376" class="desc">记录 Q1-Q4 答案</text>
  <text x="445" y="398" class="small">drawGestureQuestion()</text>

  <rect x="770" y="255" width="280" height="150" rx="24" class="boxD" filter="url(#shadow)"/>
  <text x="795" y="290" class="boxTitle">3. Collage Studio</text>
  <text x="795" y="318" class="file">state = "collageStudio"</text>
  <text x="795" y="349" class="desc">拼贴页 / 标签贴脸</text>
  <text x="795" y="376" class="desc">可撕标签 / 可准备截图</text>
  <text x="795" y="398" class="small">drawCollageStudio()</text>

  <rect x="1130" y="255" width="250" height="150" rx="24" class="boxE" filter="url(#shadow)"/>
  <text x="1155" y="290" class="boxTitle">4. Generating</text>
  <text x="1155" y="318" class="file">state = "generatingLabels"</text>
  <text x="1155" y="349" class="desc">中间页 / 生成标签</text>
  <text x="1155" y="376" class="desc">准备面部补丁数据</text>
  <text x="1155" y="398" class="small">drawGeneratingLabels()</text>

  <rect x="1460" y="255" width="250" height="150" rx="24" class="boxA" filter="url(#shadow)"/>
  <text x="1485" y="290" class="boxTitle">5. Patch Mask</text>
  <text x="1485" y="318" class="file">state = "patchMask"</text>
  <text x="1485" y="349" class="desc">补丁页 / 撕掉不认同标签</text>
  <text x="1485" y="376" class="desc">保留剩余身份碎片</text>
  <text x="1485" y="398" class="small">drawPatchMaskStage()</text>

  <path d="M 340 330 C 370 330, 385 330, 420 330" class="line"/>
  <path d="M 690 330 C 720 330, 735 330, 770 330" class="line"/>
  <path d="M 1050 330 C 1080 330, 1095 330, 1130 330" class="line"/>
  <path d="M 1380 330 C 1410 330, 1425 330, 1460 330" class="line"/>

  <text x="358" y="309" class="tag">滑动触发</text>
  <text x="710" y="309" class="tag">答完 4 题</text>
  <text x="1072" y="309" class="tag">确认进入生成</text>
  <text x="1400" y="309" class="tag">约 2.8s 后自动跳转</text>

  <rect x="615" y="520" width="280" height="150" rx="24" class="boxB" filter="url(#shadow)"/>
  <text x="640" y="555" class="boxTitle">6. Final Portrait</text>
  <text x="640" y="583" class="file">state = "finalPortrait"</text>
  <text x="640" y="614" class="desc">最终肖像页 / 保留贴片</text>
  <text x="640" y="641" class="desc">显示被拒绝标签痕迹</text>
  <text x="640" y="663" class="small">drawFinalPortrait()</text>

  <rect x="980" y="520" width="280" height="150" rx="24" class="boxC" filter="url(#shadow)"/>
  <text x="1005" y="555" class="boxTitle">7. Result Fragments</text>
  <text x="1005" y="583" class="file">state = "resultFragments"</text>
  <text x="1005" y="614" class="desc">碎片结果页 / 展示截图</text>
  <text x="1005" y="641" class="desc">可重新开始</text>
  <text x="1005" y="663" class="small">drawFragmentResultPage()</text>

  <path d="M 1585 405 C 1585 470, 930 470, 755 520" class="line"/>
  <text x="1270" y="468" class="tag">Finish → 倒计时拍摄 → 进入最终肖像</text>

  <path d="M 910 405 C 910 470, 1040 470, 1120 520" class="lineDash"/>
  <text x="905" y="456" class="tag">截图完成后进入碎片页</text>

  <rect x="50" y="875" width="1700" height="65" class="group"/>
  <text x="75" y="914" class="desc">公共入口：所有页面都由 [sketch.js](/Users/yuxinnuo/Desktop/final/sketch.js) 的 `draw()` 按 `state` 分发；点击/触摸由 [js/ui.js](/Users/yuxinnuo/Desktop/final/js/ui.js) 统一转发；重启统一回到 `intro`。</text>

  <rect x="90" y="520" width="450" height="150" rx="24" class="boxA" filter="url(#shadow)"/>
  <text x="115" y="555" class="boxTitle">补充：重启与保存</text>
  <text x="115" y="586" class="desc">Collage Studio：可保存碎片截图 / 可重启</text>
  <text x="115" y="613" class="desc">Final Portrait：可保存最终肖像 / 可重启</text>
  <text x="115" y="640" class="desc">Result Fragments：可返回重新开始</text>

  <path d="M 1260 595 C 1330 595, 1390 595, 1500 405" class="lineDash"/>
  <text x="1320" y="575" class="tag">可重新开始</text>

  <path d="M 315 520 C 315 455, 220 455, 220 405" class="lineDash"/>
  <text x="95" y="472" class="tag">任意结果页均可 resetExperience()</text>
</svg>
